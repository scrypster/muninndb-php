version: 2

# Fetch ORT native libraries and ONNX model before building.
# All platform assets are fetched here so cross-compilation (darwin → linux) works —
# each go:embed directive needs its platform asset file to exist at build time.
before:
  hooks:
    - make fetch-assets

builds:
  - id: muninn
    main: ./cmd/muninn
    binary: muninn
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - arm64
      - amd64
    ignore:
      # linux/arm64 has no ORT native library — skip until arm64 .so is added.
      - goos: linux
        goarch: arm64
      # windows/arm64 — ORT release exists but not yet tested; enable when ready.
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=1
    # Cross-compilation: darwin/amd64, linux/amd64, and windows/amd64 from an
    # arm64 Mac require the appropriate cross-compiler. Install via:
    #   brew install FiloSottile/musl-cross/musl-cross
    #   brew install SergioBenitez/osxct/x86_64-apple-darwin14
    #   brew install mingw-w64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=x86_64-linux-musl-gcc
      - goos: windows
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=x86_64-w64-mingw32-gcc

archives:
  - id: muninn
    builds: [muninn]
    name_template: "muninn_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - CHANGELOG.md
      - docs/self-hosting.md

checksum:
  name_template: "muninn_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^bench:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: scrypster
    name: muninndb
  name_template: "MuninnDB {{ .Tag }}"
  header: |
    ## MuninnDB {{ .Tag }}

    The cognitive database — memory, not storage.

    ### Install

    **macOS (Homebrew)**
    ```sh
    brew install scrypster/tap/muninn
    ```

    **Linux / macOS (direct)**
    ```sh
    curl -sSL https://github.com/scrypster/muninndb/releases/download/{{ .Tag }}/muninn_{{ .Tag }}_linux_amd64.tar.gz | tar -xz
    sudo mv muninn /usr/local/bin/
    ```

    **Windows (PowerShell)**
    ```powershell
    irm https://muninndb.com/install.ps1 | iex
    ```

    **Docker**
    ```sh
    docker pull ghcr.io/scrypster/muninndb:{{ .Tag }}
    ```

    ### Quick start
    ```sh
    muninn init   # guided setup + AI tool config
    muninn start  # start the server
    ```

    See [self-hosting guide](https://github.com/scrypster/muninndb/blob/main/docs/self-hosting.md) for full setup.
