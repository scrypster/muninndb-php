syntax = "proto3";
package muninn.v1;
option go_package = "github.com/scrypster/muninndb/proto/gen/go/muninn/v1";

message HelloRequest {
  string version = 1;
  string auth_method = 2;
  string token = 3;
  string vault = 4;
  string client = 5;
  repeated string capabilities = 6;
}

message HelloResponse {
  string server_version = 1;
  string session_id = 2;
  string vault_id = 3;
  repeated string capabilities = 4;
  Limits limits = 5;
}

message Limits {
  int32 max_results = 1;
  int32 max_hop_depth = 2;
  int32 max_rate = 3;
  int32 max_payload_mb = 4;
}

message WriteRequest {
  string concept = 1;
  string content = 2;
  repeated string tags = 3;
  float confidence = 4;
  float stability = 5;
  string vault = 6;
  string idempotent_id = 7;
  repeated Association associations = 8;
  repeated float embedding = 9;
  uint32 memory_type = 10;
  string type_label = 11;
}

message WriteResponse {
  string id = 1;
  int64 created_at = 2;
}

message BatchWriteRequest {
  repeated WriteRequest requests = 1;
}

message BatchWriteItemResult {
  int32 index = 1;
  string id = 2;
  string error = 3;
}

message BatchWriteResponse {
  repeated BatchWriteItemResult results = 1;
}

message ReadRequest {
  string id = 1;
  string vault = 2;
}

message ReadResponse {
  string id = 1;
  string concept = 2;
  string content = 3;
  float confidence = 4;
  float relevance = 5;
  repeated string tags = 6;
  uint32 state = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  int64 last_access = 10;
  uint32 access_count = 11;
  float stability = 12;
  uint32 memory_type = 13;
  string type_label = 14;
}

message ForgetRequest {
  string id = 1;
  bool hard = 2;
  string vault = 3;
}

message ForgetResponse {
  bool ok = 1;
}

message StatRequest {
  string vault = 1;
}

message StatResponse {
  int64 engram_count = 1;
  int64 storage_bytes = 2;
  int32 vault_count = 3;
  int64 index_size = 4;
}

message LinkRequest {
  string source_id = 1;
  string target_id = 2;
  uint32 rel_type = 3;
  float weight = 4;
  string vault = 5;
}

message LinkResponse {
  bool ok = 1;
}

message Association {
  string target_id = 1;
  uint32 rel_type = 2;
  float weight = 3;
  float confidence = 4;
  int64 created_at = 5;
  int32 last_activated = 6;
}

message ActivateRequest {
  repeated string context = 1;
  float threshold = 2;
  int32 max_results = 3;
  int32 max_hops = 4;
  bool include_why = 5;
  string vault = 6;
  Weights weights = 7;
  repeated Filter filters = 8;
  repeated float embedding = 9;
}

message Weights {
  float semantic_similarity = 1;
  float full_text_relevance = 2;
  float decay_factor = 3;
  float hebbian_boost = 4;
  float access_frequency = 5;
  float recency = 6;
}

message Filter {
  string field = 1;
  string op = 2;
  bytes value = 3;
}

message ActivateResponse {
  string query_id = 1;
  int32 total_found = 2;
  repeated ActivationItem activations = 3;
  double latency_ms = 4;
  int32 frame = 5;
  int32 total_frames = 6;
}

message ActivationItem {
  string id = 1;
  string concept = 2;
  string content = 3;
  float score = 4;
  float confidence = 5;
  ScoreComponents score_components = 6;
  string why = 7;
  repeated string hop_path = 8;
  bool dormant = 9;
}

message ScoreComponents {
  float semantic_similarity = 1;
  float full_text_relevance = 2;
  float decay_factor = 3;
  float hebbian_boost = 4;
  float access_frequency = 5;
  float recency = 6;
  float raw = 7;
  float final = 8;
}

message SubscribeRequest {
  string subscription_id = 1;
  repeated string context = 2;
  float threshold = 3;
  string vault = 4;
  int32 ttl = 5;
  int32 rate_limit = 6;
  bool push_on_write = 7;
  float delta_threshold = 8;
}

message SubscribeResponse {
  string sub_id = 1;
  string status = 2;
}

message ActivationPush {
  string subscription_id = 1;
  ActivationItem activation = 2;
  string trigger = 3;
  int32 push_number = 4;
  int64 at = 5;
}

service MuninnDB {
  rpc Hello(HelloRequest) returns (HelloResponse);
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc BatchWrite(BatchWriteRequest) returns (BatchWriteResponse);
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc Forget(ForgetRequest) returns (ForgetResponse);
  rpc Stat(StatRequest) returns (StatResponse);
  rpc Link(LinkRequest) returns (LinkResponse);
  rpc Activate(ActivateRequest) returns (stream ActivateResponse);
  rpc Subscribe(stream SubscribeRequest) returns (stream ActivationPush);
}
